logging:
  level:
    root: info
  config: classpath:logback.xml

server:
  #port: 8060
  port: 8070
  servlet:
    encoding:
      charset: utf-8
      enabled: true
      force: true
    context-path: /
  max-http-header-size: 4MB
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.0.253:3306/hy_core?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource #设置连接池类型为 druid
    #Druid配置 对应DruidDataSource中的setting方法。
    druid: #设置Druid连接池的自定义配置。然后 DruidDataSourceAutoConfigure 会自动化配置 Druid 连接池。
      min-idle: 5 # 池中维护的最小空闲连接数 默认为 0个
      max-active: 100 # 池中维护的最大连接数 默认为 8个
      filter:
        stat:
          log-slow-sql: true #开启慢查询
          slow-sql-millis: 5000 #慢sql的标准  单位是毫秒
          merge-sql: true #sql 合并配置
      stat-view-servlet:
        enabled: true #是否开启statviewservlet
        login-username: root
        login-password: root
      initial-size: 5 #初始化时建立物理连接的个数。初始化发生在显示调用init方法，或者第一次getConnection时
      max-wait: 6000 #获取数据库连接等等待超时时间
      time-between-eviction-runs-millis: 300000 # 设置多长时间检测需要关闭的空闲连接，单位是毫秒
      validation-query: select * from user where id = 1
      test-on-borrow: true #申 请连接时执行validationQuery检测连接是否有效，做了这个配置会降低性能。
      test-on-return: true # 归还连接时执行validationQuery检测连接是否有效，做了这个配置会降低性能
      test-while-idle: true #建议配置为true，不影响性能，并且保证安全性。
      # 申请连接的时候检测，如果空闲时间大于
      # timeBetweenEvictionRunsMillis，
      # 执行validationQuery检测连接是否有效。
  servlet:
    multipart:
      max-file-size: 100MB
      # 最大支持请求大小
      max-request-size: 100MB
  web:
    resources:
      static-locations: classpath:/resources/,classpath:/resources/static/,classpath:/static/,classpath:/static/images,file:/www/file/gy/
  #  mvc:
  #    view:
  #      prefix: /
  #      suffix: .jsp
  #  devtools:
  #    restart:
  #      enabled: true  #设置开启热部署
  #      additional-paths: src/main/java #重启目录
  redis:
    cluster:
      max-redirects:
    host: 192.168.0.105
    port: 6379
    timeout: 10000
    jedis:
      pool:
        max-active: 200
        max-wait: 10000
        max-idle: 8
        min-idle: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:/mapper/*.xml


hy:
  # 名称
  name: hy
  #域名
  realmName: http://192.168.0.75:8070
  # 版本
  version: V1.0.0
  # 版权年份
  copyrightYear: 2022
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/hy/uploadPath，Linux配置 /home/hy/uploadPath）
  profile: D:/gy/uploadPath
  # 文件路径 示例（ Windows配置D:/hy/uploadPath，Linux配置 /home/hy/uploadPath）
  tempFile: D:/gy/uploadPath/temp
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: char
  #数据接口地址
  dataUrl: http://192.168.115.88:8080/xzhouse
